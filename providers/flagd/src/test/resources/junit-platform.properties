# Enable parallel scenario execution within each suite runner.
# Each scenario borrows its own ContainerEntry from ContainerPool, so
# concurrent scenarios are fully isolated — no shared flagd process.
cucumber.execution.parallel.enabled=true
# Dynamic strategy scales with available CPUs (factor=1.0 → 1 thread per core).
# ContainerPool defaults to Runtime.availableProcessors() so pool slots match.
# Override both via -Dflagd.e2e.pool.size=N and
# -Dcucumber.execution.parallel.config.dynamic.factor=N if needed.
cucumber.execution.parallel.config.strategy=dynamic
cucumber.execution.parallel.config.dynamic.factor=1
# Scenarios tagged @env-var mutate System env vars globally.
# Serialise them behind an exclusive resource lock so concurrent scenarios
# don't clobber each other's environment variable state.
cucumber.execution.exclusive-resources.env-var.read-write=ENV_VARS
# Scenarios tagged @grace involve container restart + reconnection timing.
# Running two concurrent restarts under parallel load can push the
# reconnection past the 12-second EVENT_TIMEOUT_MS threshold. Serialise
# them so each restart has the full machine resources to itself.
cucumber.execution.exclusive-resources.grace.read-write=CONTAINER_RESTART
